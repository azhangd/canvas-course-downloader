<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Canvas Course Downloader</title>
  <style>
    :root {
      --brand: #e82429;
      --brand-hover: #c51f23;
      --brand-tint: #fef2f2;
      --text: #1f2937;
      --text-muted: #6b7280;
      --text-faint: #9ca3af;
      --border: #e5e7eb;
      --surface: #ffffff;
      --hover: #f9fafb;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 320px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--surface);
      color: var(--text);
      letter-spacing: -0.005em;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }
    .brand-mark {
      width: 28px; height: 28px; border-radius: 7px;
      flex-shrink: 0;
      display: block;
    }
    .header h2 {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      letter-spacing: -0.01em;
    }

    /* Status pill */
    #status {
      font-size: 12px;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      background: var(--hover);
      border-radius: 8px;
    }
    #status::before {
      content: "";
      width: 6px; height: 6px; border-radius: 999px;
      background: var(--text-faint);
      flex-shrink: 0;
    }
    #status.state-success { color: #15803d; background: #f0fdf4; }
    #status.state-success::before { background: #22c55e; }
    #status.state-error { color: #b91c1c; background: var(--brand-tint); }
    #status.state-error::before { background: #dc2626; }

    /* Info card */
    .info-section {
      background: var(--hover);
      border-radius: 10px;
      padding: 10px 12px;
      margin-top: 10px;
      font-size: 12px;
      color: var(--text-muted);
      line-height: 1.5;
      display: none;
    }
    .info-section .info-label {
      font-weight: 600;
      color: var(--text-muted);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 6px;
    }
    .info-section .info-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .info-section .info-value {
      color: var(--text);
      font-weight: 500;
      font-size: 13px;
    }

    /* Content tags */
    .content-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-top: 2px;
    }
    .content-tag {
      background: #f3f4f6;
      border-radius: 999px;
      padding: 2px 8px;
      font-size: 10.5px;
      color: var(--text-faint);
      font-weight: 500;
      border: 1px solid transparent;
    }
    .content-tag.active {
      background: var(--brand-tint);
      color: #b91c1c;
      border-color: #fecaca;
    }

    /* Queue */
    .queue-section {
      background: #fffbeb;
      border: 1px solid #fde68a;
      border-radius: 10px;
      padding: 10px 12px;
      margin-top: 10px;
      font-size: 12px;
      display: none;
    }
    .queue-section .queue-label {
      font-weight: 600;
      color: #92400e;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 6px;
    }
    .queue-bar-bg {
      background: rgba(146, 64, 14, 0.15);
      border-radius: 999px;
      height: 5px;
      overflow: hidden;
      margin-top: 6px;
    }
    .queue-bar {
      background: var(--brand);
      height: 100%;
      border-radius: 999px;
      transition: width 0.3s;
    }
    .queue-stats {
      margin-top: 6px;
      font-size: 11px;
      color: #92400e;
    }

    /* Primary button */
    button#downloadBtn {
      width: 100%;
      padding: 10px 14px;
      background: var(--brand);
      color: #fff;
      border: none;
      border-radius: 9px;
      cursor: pointer;
      margin-top: 14px;
      font-size: 13.5px;
      font-weight: 600;
      font-family: inherit;
      letter-spacing: -0.005em;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      box-shadow: 0 1px 2px rgba(0,0,0,0.06);
      transition: background 0.12s, transform 0.08s, box-shadow 0.12s;
    }
    button#downloadBtn:hover {
      background: var(--brand-hover);
      box-shadow: 0 2px 6px rgba(0,0,0,0.12);
    }
    button#downloadBtn:active { transform: scale(0.98); }
    button#downloadBtn:disabled {
      background: var(--border);
      color: var(--text-faint);
      cursor: not-allowed;
      box-shadow: none;
    }
    button#downloadBtn svg { width: 14px; height: 14px; }

    /* Footer */
    .footer {
      margin-top: 12px;
      padding-top: 10px;
      border-top: 1px solid var(--border);
      font-size: 10.5px;
      color: var(--text-faint);
      text-align: center;
      line-height: 1.6;
    }
    .footer a {
      color: var(--text-muted);
      text-decoration: none;
      transition: color 0.12s;
    }
    .footer a:hover { color: var(--text); }

    /* Feedback prompt */
    .feedback-card {
      margin-top: 12px;
      padding: 12px;
      background: var(--hover);
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 12.5px;
      display: none;
      position: relative;
    }
    .feedback-card .feedback-dismiss {
      position: absolute;
      top: 6px;
      right: 8px;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-faint);
      font-size: 14px;
      line-height: 1;
      padding: 2px 4px;
      font-family: inherit;
    }
    .feedback-card .feedback-dismiss:hover { color: var(--text); }
    .feedback-card .feedback-prompt {
      color: var(--text);
      font-weight: 500;
      margin-bottom: 8px;
      padding-right: 16px;
    }
    .feedback-card .feedback-actions {
      display: flex;
      gap: 6px;
    }
    .feedback-btn {
      flex: 1;
      padding: 7px 10px;
      border: 1px solid var(--border);
      background: var(--surface);
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      font-family: inherit;
      color: var(--text);
      transition: background 0.12s, border-color 0.12s, transform 0.08s;
    }
    .feedback-btn:hover {
      background: var(--hover);
      border-color: var(--border-strong, #d1d5db);
    }
    .feedback-btn:active { transform: scale(0.98); }
    .feedback-followup {
      color: var(--text-muted);
      line-height: 1.5;
      display: none;
    }
    .feedback-followup a {
      color: var(--brand);
      font-weight: 600;
      text-decoration: none;
    }
    .feedback-followup a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="header">
    <img class="brand-mark" src="icons/icon-128.png" alt="">
    <h2>Course Downloader</h2>
  </div>

  <div id="status">Checking page...</div>

  <div class="info-section" id="courseInfo">
    <div class="info-row">
      <span id="courseName"></span>
    </div>
    <div id="contentTypesRow">
      <div class="info-label" style="margin-top:10px;">Exporting</div>
      <div class="content-tags" id="contentTags"></div>
    </div>
  </div>

  <div class="queue-section" id="queueSection">
    <div class="queue-label">Downloads in progress</div>
    <div id="queueText"></div>
    <div class="queue-bar-bg"><div class="queue-bar" id="queueBar" style="width:0%"></div></div>
    <div class="queue-stats" id="queueStats"></div>
  </div>

  <button id="downloadBtn" disabled>
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <path d="M12 4v12"/><path d="M6 12l6 6 6-6"/><path d="M5 20h14"/>
    </svg>
    <span id="downloadBtnLabel">Download Course Content</span>
  </button>

  <div class="feedback-card" id="feedbackCard">
    <button class="feedback-dismiss" id="feedbackDismiss" aria-label="Dismiss">×</button>
    <div class="feedback-ask" id="feedbackAsk">
      <div class="feedback-prompt">Enjoying Course Downloader?</div>
      <div class="feedback-actions">
        <button class="feedback-btn" id="feedbackYes">👍 Yes</button>
        <button class="feedback-btn" id="feedbackNo">👎 Not really</button>
      </div>
    </div>
    <div class="feedback-followup" id="feedbackPositive">
      Glad to hear it! A quick <a href="https://chromewebstore.google.com/detail/mmnmcnffbkcnhcjiidmdnaclpfeekiol/reviews" target="_blank" id="reviewLink">review on the Web Store</a> helps other students find it.
    </div>
    <div class="feedback-followup" id="feedbackNegative">
      Sorry about that. <a href="https://github.com/jasp-nerd/canvas-course-downloader/issues/new" target="_blank" id="feedbackLink">Tell us what went wrong</a> — we read every report.
    </div>
  </div>

  <div class="footer">
    <a href="#" id="settingsLink">Settings</a>
  </div>
  <script src="popup.js"></script>
</body>
</html>
